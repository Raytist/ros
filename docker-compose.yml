services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: roseltorg
      POSTGRES_PASSWORD: roseltorg
      POSTGRES_DB: roseltorg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roseltorg"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://roseltorg:roseltorg@postgres:5432/roseltorg
      JWT_SECRET: roseltorg-jwt-secret-change-me
      CORS_ORIGIN: http://localhost:3000
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
